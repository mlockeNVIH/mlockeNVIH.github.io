/* ═══ VALIDATION ═══ */
function validateStep(si, code, pickedPhoto) {
  const syn = checkSyntax(code);
  if (syn) return syn;
  const bc = _body(code), hc = _head(code), lines = code.split("\n");
  const findLine = (re) => { for (let i = 0; i < lines.length; i++) if (re.test(lines[i])) return i + 1; return null; };
  const bodyTags = ["h1","h2","h3","h4","h5","h6","p","ul","ol","li","img","a"];
  for (const t of bodyTags) { const r = new RegExp(`<${t}[\\s>]`,"i"); if (r.test(hc)) return { message: `<${t}> is inside <head> — move it to <body>.`, line: findLine(r) }; }
  if (/<style[\s>]/i.test(bc)) return { message: "<style> belongs in <head>, not <body>.", line: findLine(/<style[\s>]/i) };
  const ic = checkIndentation(code, si); if (ic) return ic;
  switch (si) {
    case 0: return null;
    case 1: { if (!/<h1[\s>]/i.test(bc)) return { message: "Missing <h1> inside <body>.", line: null }; if (!/<\/h1>/i.test(bc)) return { message: "Missing closing </h1>.", line: findLine(/<h1[\s>]/i) }; if (!/<h1[^>]*>[^<]+<\/h1>/i.test(bc)) return { message: "<h1> is empty.", line: findLine(/<h1[\s>]/i) }; return null; }
    case 2: { if (!/<p[\s>]/i.test(bc)) return { message: "Missing <p> in <body>.", line: null }; if (!/<\/p>/i.test(bc)) return { message: "Missing closing </p>.", line: findLine(/<p[\s>]/i) }; if (!/<p[^>]*>[^<]+<\/p>/i.test(bc)) return { message: "<p> is empty.", line: findLine(/<p[\s>]/i) }; return null; }
    case 3: { if (!pickedPhoto) return { message: "Pick a photo first.", line: null }; if (!/<img[\s>]/i.test(bc)) return { message: "Missing <img>.", line: null }; return null; }
    case 4: { if (!/<h2[\s>]/i.test(bc)) return { message: "Missing <h2>.", line: null }; if (!/<h2[^>]*>[^<]+<\/h2>/i.test(bc)) return { message: "<h2> is empty.", line: findLine(/<h2[\s>]/i) }; if (!/<ul[\s>]/i.test(bc)&&!/<ol[\s>]/i.test(bc)) return { message: "Missing list.", line: null }; if (!/<li[^>]*>[^<]+<\/li>/i.test(bc)) return { message: "<li> items empty.", line: findLine(/<li[\s>]/i) }; return null; }
    case 5: { if (!/<a\s/i.test(bc)) return { message: "Missing <a> tag.", line: null }; if (!/href=["'][^"']+["']/i.test(bc)) return { message: "<a> needs href.", line: findLine(/<a\s/i) }; if (!/<a[^>]*>[^<]+<\/a>/i.test(bc)) return { message: "Link needs text.", line: findLine(/<a\s/i) }; return null; }
    case 6: { if (!/<style[\s>]/i.test(hc)) return { message: "Missing <style> in <head>.", line: null }; if (!/h1\s*\{/i.test(hc)) return { message: "Add h1 CSS rule.", line: findLine(/<style[\s>]/i) }; return null; }
    case 7: { if (!/body\s*\{/i.test(code)) return { message: "Missing body CSS. Hit Auto-Complete.", line: null }; return null; }
    default: return null;
  }
}
function checkIndentation(code, si) {
  const lines = code.split("\n");
  const depthTags = { "html":0,"/html":0,"head":0,"/head":0,"body":0,"/body":0,"meta":2,"title":2,"/title":2,"style":2,"/style":2,"h1":2,"/h1":2,"h2":2,"/h2":2,"p":2,"/p":2,"img":2,"a":2,"/a":2,"ul":2,"/ul":2,"ol":2,"/ol":2,"li":4,"/li":4 };
  const stepTags = { 1:["h1"], 2:["p"], 3:["img"], 4:["h2","ul","li"], 5:["p","a"], 6:["style"], 7:[], 8:[] };
  const rel = stepTags[si] || []; if (!rel.length) return null;
  for (let i = 0; i < lines.length; i++) {
    const tr = lines[i].trimStart(); if (!tr || !tr.startsWith("<")) continue;
    const tm = tr.match(/^<\/?([a-z0-9]+)/i); if (!tm) continue;
    const tn = tm[1].toLowerCase(); if (!rel.includes(tn)) continue;
    const key = tr.startsWith("</") ? `/${tn}` : tn; const exp = depthTags[key]; if (exp === undefined) continue;
    const act = lines[i].length - lines[i].trimStart().length;
    if (act !== exp) { const tabs = exp / 2; return { message: `Line ${i+1}: <${tn}> needs ${tabs} tab${tabs!==1?"s":""} (${exp} spaces) indent.`, line: i+1 }; }
  }
  return null;
}
function checkSyntax(code) {
  const lines = code.split("\n");
  for (let i = 0; i < lines.length; i++) {
    let inTag = false;
    for (let j = 0; j < lines[i].length; j++) {
      if (lines[i][j] === "<") { if (inTag) return { message: `Line ${i+1}: Unclosed '<' — missing '>'.`, line: i+1 }; inTag = true; }
      else if (lines[i][j] === ">") { if (!inTag) return { message: `Line ${i+1}: Unexpected '>'.`, line: i+1 }; inTag = false; }
    }
    if (inTag) return { message: `Line ${i+1}: Unclosed tag — missing '>'.`, line: i+1 };
  }
  if (/<html/i.test(code) && !/<\/html>/i.test(code)) return { message: "Missing </html>.", line: null };
  if (/<head/i.test(code) && !/<\/head>/i.test(code)) return { message: "Missing </head>.", line: null };
  if (/<body/i.test(code) && !/<\/body>/i.test(code)) return { message: "Missing </body>.", line: null };
  return null;
}

/* ═══ INDENT GUIDES (full-length lines) ═══ */
function IndentGuides({ code, scrollTop }) {
  const lines = useMemo(() => code.split("\n"), [code]);
  const charW = ED_SIZE * 0.6;
  const lineH = ED_SIZE * ED_LH;
  // For each indent depth, find the range of lines that have at least that depth
  const maxDepth = 6;
  const guides = useMemo(() => {
    const result = [];
    for (let d = 1; d <= maxDepth; d++) {
      let start = null;
      for (let i = 0; i <= lines.length; i++) {
        const line = i < lines.length ? lines[i] : "";
        let spaces = 0;
        for (let j = 0; j < line.length && line[j] === " "; j++) spaces++;
        const depth = Math.floor(spaces / 2);
        const hasContent = line.trim().length > 0;
        if (hasContent && depth >= d) {
          if (start === null) start = i;
        } else {
          if (start !== null) {
            result.push({ depth: d, startLine: start, endLine: i - 1 });
            start = null;
          }
        }
      }
    }
    return result;
  }, [lines]);

  return (
    <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, pointerEvents: "none", overflow: "hidden" }}>
      <div style={{ position: "relative", top: -scrollTop, paddingTop: ED_PAD }}>
        {guides.map((g, i) => (
          <div key={i} style={{
            position: "absolute",
            left: ED_LEFT + (g.depth - 1) * 2 * charW + charW * 0.3,
            top: g.startLine * lineH,
            width: 1,
            height: (g.endLine - g.startLine + 1) * lineH,
            background: GUIDE_COLORS[(g.depth - 1) % GUIDE_COLORS.length],
          }} />
        ))}
      </div>
    </div>
  );
}

}

/* ═══ GHOST EDITOR ═══ */
function GhostEditor({ code, onChange, ghost, tagsOnly, insertAfter, noGhost, stepDone, stepEntryCode, onAutoComplete, onReset, hoverMode, setHoverMode, fullSnippetPresent, errorLine }) {
  const textareaRef = useRef(null);
  const preRef = useRef(null);
  const [confirm, setConfirm] = useState(null);
  const [scrollTop, setScrollTop] = useState(0);
  const handleScroll = useCallback(() => { if (preRef.current && textareaRef.current) { preRef.current.scrollTop = textareaRef.current.scrollTop; preRef.current.scrollLeft = textareaRef.current.scrollLeft; setScrollTop(textareaRef.current.scrollTop); } }, []);
  const handleKey = (e) => { if (e.key === "Tab") { e.preventDefault(); const t = e.target, st = t.selectionStart, en = t.selectionEnd; const nc = t.value.substring(0, st) + "  " + t.value.substring(en); onChange(nc); requestAnimationFrame(() => { t.selectionStart = t.selectionEnd = st + 2; }); } };

/* ═══ WORKSHOP ═══ */
function Workshop({ name }) {
  const steps = useMemo(() => buildSteps(name), [name]);
  const [step, setStep] = useState(0);
  const [code, setCode] = useState(steps[0].prefill || "");
  const [saved, setSaved] = useState(false);
  const [stepEntryCode, setStepEntryCode] = useState(steps[0].prefill || "");
  const [hoverMode, setHoverMode] = useState(null);
  const [pickedPhoto, setPickedPhoto] = useState(null);
  const [validationError, setValidationError] = useState(null);
  const s = steps[step], last = step === steps.length - 1;

  const effectiveSnippet = useMemo(() => { if (step === 3 && pickedPhoto) return `  <img src="${pickedPhoto.url}" alt="${pickedPhoto.label}">`; return s.snippet; }, [step, pickedPhoto, s.snippet]);
  const effectiveInsertAfter = useMemo(() => { if (step === 4 && pickedPhoto) return `alt="${pickedPhoto.label}">`; return s.insertAfter; }, [step, pickedPhoto, s.insertAfter]);

  useEffect(() => { setStepEntryCode(code); setHoverMode(null); setValidationError(null); }, [step]);
  useEffect(() => { if (validationError) setValidationError(null); }, [code]);

  const tagsPresent = useCallback((si) => { const st = steps[si]; const snip = si === 3 && pickedPhoto ? `<img src="${pickedPhoto.url}"` : st.snippet; if (!snip) return true; if (st.tagsOnly) { const tl = st.tagsOnly.trim().split("\n")[0].trim(); if (tl.length > 3 && code.includes(tl)) return true; } const tm = snip.match(/<(\w+)[\s>]/); if (tm) { const af = si === 3 ? "</p>" : (si === 4 && pickedPhoto ? `alt="${pickedPhoto.label}">` : st.insertAfter); const ai = af ? code.indexOf(af) : -1; if (ai !== -1 && code.indexOf(`<${tm[1]}`, ai) !== -1) return true; } return false; }, [code, steps, pickedPhoto]);
  const fullSnippetPresent = useCallback((si) => { const snip = si === 3 && pickedPhoto ? `<img src="${pickedPhoto.url}"` : steps[si].snippet; if (!snip) return true; const fl = snip.trim().split("\n")[0].trim(); return fl.length > 3 && code.includes(fl); }, [code, steps, pickedPhoto]);
  const isStepDone = useCallback((si) => tagsPresent(si), [tagsPresent]);

  const doInsert = useCallback((snip, after, src) => { const idx = src.lastIndexOf(after); if (idx === -1) { const bc = src.lastIndexOf("</body>"); if (bc !== -1) return src.substring(0, bc) + snip + "\n" + src.substring(bc); return src + "\n" + snip; } const ae = idx + after.length, nl = src.indexOf("\n", ae), sp = nl === -1 ? ae : nl; return src.substring(0, sp) + "\n" + snip + src.substring(sp); }, []);

  const handlePhotoPick = useCallback((photo) => { setPickedPhoto(photo); const nc = doInsert(`  <img src="${photo.url}" alt="${photo.label}">`, "</p>", code); setCode(nc); }, [code, doInsert]);

  const handleToolClick = useCallback((key) => {
    const item = ALL_TOOLBAR_ITEMS.find(t => t.key === key); if (!item) return;
    if (item.stepLinked !== undefined) {
      const si = item.stepLinked, st = steps[si]; if (!st || si === 3) return;
      const snip = st.tagsOnly || st.snippet; if (!snip) return;
      const af = si === 4 && pickedPhoto ? `alt="${pickedPhoto.label}">` : st.insertAfter; if (!af) return;
      const nc = doInsert(snip, af, code); setCode(nc);
      if (st.tagsOnly) { requestAnimationFrame(() => { const ta = GhostEditor._textareaRef?.current; if (!ta) return; const ft = st.tagsOnly.trim().split("\n")[0].trim(); const ti = nc.indexOf(ft); if (ti !== -1) { const co = ft.indexOf("></"); if (co !== -1) { const p = ti + co + 1; ta.focus(); requestAnimationFrame(() => { ta.selectionStart = ta.selectionEnd = p; }); } } }); }
    }
  }, [steps, code, doInsert, pickedPhoto]);

  const handleAutoComplete = useCallback((ow) => { if (!effectiveSnippet || !effectiveInsertAfter) return; let base = ow ? stepEntryCode : code; const nc = doInsert(effectiveSnippet, effectiveInsertAfter, base); setCode(nc); }, [code, effectiveSnippet, effectiveInsertAfter, stepEntryCode, doInsert]);
  const handleReset = useCallback(() => setCode(stepEntryCode), [stepEntryCode]);

  const goNext = useCallback(() => { if (step >= steps.length - 1) return; const err = validateStep(step, code, pickedPhoto); if (err) { setValidationError(err); return; } setValidationError(null); setStep(step + 1); }, [step, steps, code, pickedPhoto]);

  const copyAll = async () => { try { await navigator.clipboard.writeText(code); } catch { const ta = document.createElement("textarea"); ta.value = code; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); } };
  const handleSave = useCallback(() => { const fn = `${name.toLowerCase().replace(/[^a-z0-9]/g, "-").substring(0, 20)}-website.html`; const blob = new Blob([code], { type: "text/html" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = fn; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); setSaved(true); setTimeout(() => setSaved(false), 3000); }, [code, name]);

  const btnBase = { padding: "8px 20px", borderRadius: 8, border: "none", fontSize: 11.5, fontWeight: 700, textTransform: "uppercase", letterSpacing: "1px", cursor: "pointer", fontFamily: FONT_UI, transition: "all 0.2s" };

  return (
    <div style={{ width: "100vw", height: "100vh", display: "flex", flexDirection: "column", fontFamily: FONT_UI, background: "#f1f5f4", overflow: "hidden" }}>
      <div style={{ height: 44, minHeight: 44, background: `linear-gradient(135deg, ${G} 0%, #0d3d1c 100%)`, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", padding: "0 16px", flexShrink: 0 }}>
        <span style={{ position: "absolute", left: 16, fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.7)" }}>Step {step + 1} / {steps.length}</span>
        <h1 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: "white", textTransform: "uppercase", letterSpacing: "1.5px" }}>Web Workshop</h1>
        <span style={{ position: "absolute", right: 16, fontSize: 11, fontWeight: 500, color: "rgba(255,255,255,0.65)" }}>{name}</span>
      </div>
      <div style={{ flex: 1, display: "flex", overflow: "hidden", minHeight: 0 }}>
        <div style={{ width: "50%", display: "flex", flexDirection: "column", borderRight: "1px solid #cbd5e1", background: "#fff", overflow: "hidden" }}>
          <div style={{ padding: "12px 20px", borderBottom: "1px solid #e2e8f0", background: "#f8faf9", flexShrink: 0, overflowY: "auto", maxHeight: s.isPhotoPicker ? "55%" : "35%" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
              <h2 style={{ margin: 0, fontSize: 13, fontWeight: 700, color: G, textTransform: "uppercase", letterSpacing: "0.5px" }}>{step + 1}. {s.title}</h2>
              {(s.substeps?.length > 0 || s.isPhotoPicker) && (() => { const allDone = s.substeps?.length > 0 ? s.substeps.every(ss => ss.check(code, pickedPhoto)) : isStepDone(step); return <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.5px", padding: "2px 8px", borderRadius: 4, background: allDone ? "#dcfce7" : "#fef3c7", color: allDone ? "#166534" : "#92400e" }}>{allDone ? "✓ Done" : "To do"}</span>; })()}
            </div>
            <div style={{ fontWeight: 700, color: G, fontSize: 12.5, marginBottom: 4 }}>Goal: {s.goal}</div>
            {s.substeps?.length > 0 && <div style={{ margin: "4px 0" }}>{s.substeps.map((ss, si) => { const done = ss.check(code, pickedPhoto); return (<div key={si} style={{ display: "flex", alignItems: "flex-start", gap: 6, fontSize: 12, lineHeight: 1.5, marginBottom: 2 }}><span style={{ flexShrink: 0, width: 18, height: 18, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, background: done ? "#dcfce7" : "#f1f5f9", color: done ? "#166534" : "#64748b", border: done ? "1px solid #86efac" : "1px solid #e2e8f0", transition: "all 0.2s" }}>{done ? "✓" : si + 1}</span><span style={{ color: done ? "#64748b" : "#334155" }}>{ss.text}</span></div>); })}</div>}
            {s.tips?.length > 0 && <div style={{ fontSize: 11.5, color: "#64748b", marginTop: 2 }}>{s.tips.map((t, i) => <div key={i} style={{ paddingLeft: 4 }}>• {t}</div>)}</div>}
            {s.isPhotoPicker && <InlinePhotoPicker onPick={handlePhotoPick} picked={pickedPhoto} />}
          </div>
          <ValidationBanner error={validationError} onDismiss={() => setValidationError(null)} />
          <Toolbar currentStep={step} onToolClick={handleToolClick} setHoverMode={setHoverMode} />
          <GhostEditor code={code} onChange={setCode} ghost={effectiveSnippet} tagsOnly={s.tagsOnly} insertAfter={effectiveInsertAfter} noGhost={s.noGhost} stepDone={isStepDone(step)} stepEntryCode={stepEntryCode} onAutoComplete={handleAutoComplete} onReset={handleReset} hoverMode={hoverMode} setHoverMode={setHoverMode} fullSnippetPresent={fullSnippetPresent(step)} errorLine={validationError?.line || null} />
        </div>
        <div style={{ width: "50%", display: "flex", flexDirection: "column", background: "#fff", overflow: "hidden" }}>
          <div style={{ height: 34, minHeight: 34, display: "flex", alignItems: "center", padding: "0 16px", borderBottom: "1px solid #e2e8f0", background: "#f8fafc", flexShrink: 0 }}>
            {["#ef4444","#eab308","#22c55e"].map((c, i) => <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: c, marginRight: 6 }} />)}
            <span style={{ fontSize: 11, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "1px", marginLeft: 8 }}>Live Preview</span>
          </div>
          <iframe srcDoc={code || "<html><body style='display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;color:#94a3b8;'><p>Your page appears here as you type...</p></body></html>"} style={{ flex: 1, width: "100%", border: "none", background: "#fff" }} title="preview" sandbox="allow-scripts" />
        </div>
      </div>
      <div style={{ height: 52, minHeight: 52, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 20px", borderTop: "1px solid #cbd5e1", background: "#f8fafc", flexShrink: 0, gap: 12 }}>
        <button onClick={() => step > 0 && setStep(step - 1)} style={{ ...btnBase, background: "transparent", color: "#475569", border: "1px solid #cbd5e1", opacity: step === 0 ? 0.4 : 1, pointerEvents: step === 0 ? "none" : "auto" }}>← Back</button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>{steps.map((_, i) => <div key={i} onClick={() => setStep(i)} title={`Step ${i + 1}: ${steps[i].title}`} style={{ width: i === step ? 24 : 10, height: 10, borderRadius: i === step ? 5 : "50%", background: i === step ? G : i < step ? G : "#cbd5e1", opacity: i === step ? 1 : i < step ? 0.5 : 1, transition: "all 0.25s ease", cursor: "pointer" }} />)}</div>
        <div style={{ display: "flex", gap: 8 }}>
          {last ? (<><button onClick={copyAll} style={{ ...btnBase, background: "#7B3F00", color: "white" }}>Copy HTML</button><button onClick={handleSave} style={{ ...btnBase, background: `linear-gradient(135deg, ${G} 0%, #0d3d1c 100%)`, color: "white" }}>{saved ? "✓ Saved!" : "Save as .html"}</button></>) : (<button onClick={goNext} style={{ ...btnBase, background: G, color: "white" }}>Next →</button>)}
        </div>
      </div>
    </div>
  );
}

/* ═══ ROOT ═══ */
function App() {
  const [name, setName] = useState(null);
  const [screen, setScreen] = useState(0); // 0=concepts, 1=controls, 2=workshop
  if (!name) return <EntryScreen onStart={setName} />;
  if (screen === 0) return <ConceptsScreen name={name} onContinue={() => setScreen(1)} />;
  if (screen === 1) return <ControlsScreen onContinue={() => setScreen(2)} />;
  return <Workshop name={name} />;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
